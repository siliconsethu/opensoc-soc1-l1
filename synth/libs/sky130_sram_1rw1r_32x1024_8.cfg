# OpenRAM configuration for sky130 1024x32 SRAM (L1 = 4 KB)
# Generate Liberty + GDSII + LEF:
#   pip install openram
#   openram sky130_sram_1rw1r_32x1024_8.cfg
#
# Alternatively, download pre-generated from efabless:
#   https://github.com/efabless/sky130_sram_macros
#   Place sky130_sram_1rw1r_32x1024_8.lib here and
#       sky130_sram_1rw1r_32x1024_8.v  in synth/rtl/ (replace stub in t1_sram_sky130_wrap.sv)

word_size         = 32
num_words         = 1024
num_banks         = 1
tech_name         = sky130
nominal_corner_only = True
process_corners   = ["TT"]
supply_voltages   = [1.8]
temperatures      = [25]
output_name       = sky130_sram_1rw1r_32x1024_8
output_path       = sky130_sram_1rw1r_32x1024_8/
